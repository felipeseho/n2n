file:
  
  inputPaths:
    # - "/Users/felipeseho/Desktop/bases/partners_rollover_afagu_tombamento_conteudo_20251216_0_000000000000.csv"
    # - "/Users/felipeseho/Desktop/bases/partners_rollover_afagu_tombamento_conteudo_20251216_1_000000000000.csv"
    # - "/Users/felipeseho/Desktop/bases/partners_rollover_algar_etica_tombamento_conteudo_20251216_0_000000000000.csv"
    # - "/Users/felipeseho/Desktop/bases/partners_rollover_algar_etica_tombamento_conteudo_20251216_1_000000000000.csv"
    - "/Users/felipeseho/Desktop/bases/partners_rollover_brisanet_tombamento_conteudo_20251216_0_000000000000.csv"
    - "/Users/felipeseho/Desktop/bases/partners_rollover_brisanet_tombamento_conteudo_20251216_1_000000000000.csv"
    # - "/Users/felipeseho/Desktop/bases/partners_rollover_cariap_tombamento_conteudo_20251216_0_000000000000.csv"
    # - "/Users/felipeseho/Desktop/bases/partners_rollover_cariap_tombamento_conteudo_20251216_1_000000000000.csv"
 
  batchLines: 1200
  startLine: 2
  #maxLines: 1 # Opcional: limita o número de linhas a processar (útil para testes)
  logDirectory: "logs" # Diretório onde os logs serão salvos
  csvDelimiter: ";"
  checkpointDirectory: "checkpoints" # Diretório onde os checkpoints serão salvos
  columns:
    - column: "name"
      type: "string"
    - column: "email"
      type: "string"
    - column: "cpf"
      type: "string"
    - column: "cnpj"
      type: "string"
    - column: "msisdn"
      type: "string"
    - column: partner
      type: string
    - column: "newMsisdn"
      type: "string"
    - column: "subscriptionId"
      type: "string"
    - column: "newSubscriptionId"
      type: "string"
    - column: "subPartnerId" # Campo com "P" maiúsculo conforme o CSV fornecido (diferente dos models repassados)
      type: "string"
    - column: "token"
      type: "string"
    - column: "expiryDate"
      type: "date"
      format: "dd/MM/yyyy HH:mm:ss"
    - column: "nextBillDate"
      type: "date"
      format: "dd/MM/yyyy HH:mm:ss"
    - column: "chargingResult"
      type: "string"
    - column: "cents"
      type: "string"
    - column: "campaign"
      type: "string"
    - column: "productId"
      type: "string"
    - column: "serviceId"
      type: "string"
    - column: "la"
      type: "string"
    - column: "text"
      type: "string"
    - column: "args"
      type: "string"
    - column: "raw"
      type: "string"
    - column: "eventDate"
      type: "date"
      format: "yyyy-MM-dd HH:mm:ss" # Campo já com o tratamento sem o Z no final e sem o milissegundos

defaultEndpoint: "subscription_create"

endpoints:
  - name: "subscription_create"
    endpointUrl: "https://api-corporativo.whitelabel.com.br/hub-connect-tomb1/v1/hub-connect-api-tomb1/events/ingest"
    # endpointUrl: "https://test-seho.requestcatcher.com/"
    # headers:
    #   Authorization: "Bearer seu-token-aqui"
    #   X-Custom-Header: "valor-customizado"
    method: "POST"
    requestTimeout: 30
    retryAttempts: 3
    retryDelaySeconds: 5
    maxRequestsPerSecond: 600
    mapping:
      - attribute: "event"
        fixedValue: "subscription_create"
      - attribute: "eventDate"
        csvColumn: "eventDate"
      - attribute: "partner"
        csvColumn: "partner"
      - attribute: "path"
        fixedValue: "/api/v1/events/ingest"
      - attribute: "payload.name"
        csvColumn: "name"
        transform: "empty-to-null"
      - attribute: "payload.email"
        csvColumn: "email"
        transform: "empty-to-null"
      - attribute: "payload.cpf"
        csvColumn: "cpf"
        transform: "empty-to-null"
      - attribute: "payload.cnpj"
        csvColumn: "cnpj"
        transform: "empty-to-null"
      - attribute: "payload.msisdn"
        csvColumn: "msisdn"
        transform: "empty-to-null"
      - attribute: "payload.newMsisdn"
        csvColumn: "newMsisdn"
        transform: "empty-to-null"
      - attribute: "payload.subscriptionId"
        csvColumn: "subscriptionId"
        transform: "empty-to-null"
      - attribute: "payload.newSubscriptionId"
        csvColumn: "newSubscriptionId"
        transform: "empty-to-null"
      - attribute: "payload.subpartnerId"
        csvColumn: "subpartnerId"
        transform: "empty-to-null"
      - attribute: "payload.expiryDate"
        csvColumn: "expiryDate"
      - attribute: "payload.campaign"
        csvColumn: "campaign"
        transform: "lowercase"
      - attribute: "payload.productId"
        csvColumn: "productId"
      - attribute: "payload.serviceId"
        csvColumn: "serviceId"