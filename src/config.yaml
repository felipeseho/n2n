file:
  
  inputPaths:
    - "/Users/felipeseho/Desktop/bases/partners_rollover_algar-etica_tombamento_20251218_seguranca_0_000000000000.csv"
  
  batchLines: 1
  startLine: 1
  maxLines: 1 # Opcional: limita o número de linhas a processar (útil para testes)
  logDirectory: "logs" # Diretório onde os logs serão salvos
  csvDelimiter: ";"
  checkpointDirectory: "checkpoints" # Diretório onde os checkpoints serão salvos
  columns:
    - column: "subscription_id"
      type: "string"
    - column: "campaign"
      type: "string"
    - column: "user_cpf"
      type: "string"
    - column: "user_cnpj"
      type: "string"
    - column: "user_email"
      type: "string"
    - column: "user_msisdn"
      type: "string"
    - column: "status"
      type: "string"
    - column: "partner"
      type: "string"
    - column: "subpartner_id"
      type: "string"
    - column: "event_date"
      type: "date"
      format: "yyyy-MM-dd'T'HH:mm:ss'Z'"

defaultEndpoint: "subscription_create"

endpoints:
  - name: "subscription_create"
    
    ###### TROCAR PARTNER NA URL
    # endpointUrl: "https://api-corporativo-homol.whitelabel.com.br/hub-connect/v2/hub-connect-api/{oartner}/v2/subscription"
    endpointUrl: "https://test-seho.requestcatcher.com/"

    # headers:
    #   Authorization: "Bearer seu-token-aqui"
    #   X-Custom-Header: "valor-customizado"
    method: "POST"
    requestTimeout: 30
    retryAttempts: 3
    retryDelaySeconds: 5
    maxRequestsPerSecond: 1
    mapping:
      - attribute: "subscription_id"
        csvColumn: "subscription_id"
      - attribute: "campaign"
        csvColumn: "campaign"
      - attribute: "user.cpf"
        csvColumn: "user_cpf"
        transform: "empty-to-null"
      - attribute: "user.cnpj"
        csvColumn: "user_cnpj"
        transform: "empty-to-null"
      - attribute: "user.email"
        csvColumn: "user_email"
        transform: "empty-to-null"
      - attribute: "user.msisdn"
        csvColumn: "user_msisdn"
        transform: "empty-to-null"
      - attribute: "partner"
        csvColumn: "partner"
      - attribute: "subpartner_id"
        csvColumn: "subpartner_id"
      - attribute: "subscriptionStartDate"
        csvColumn: "event_date"