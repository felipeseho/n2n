file:
  inputPath: "/home/cesar.domingos/Workspace/Code/EXAHub/scripts/n2n/data/csv-model-with-insurance.csv"
  batchLines: 1
  startLine: 1
  maxLines: 100 # Opcional: limita o número de linhas a processar (útil para testes)
  logDirectory: "logs" # Diretório onde os logs serão salvos
  csvDelimiter: ","
  checkpointDirectory: "checkpoints" # Diretório onde os checkpoints serão salvos
  columns:
    - column: "name"
      type: "string"
    - column: "email"
      type: "string"
    - column: "cpf"
      type: "string"
    - column: "cnpj"
      type: "string"
    - column: "msisdn"
      type: "string"
    - column: "newMsisdn"
      type: "string"
    - column: "subscriptionId"
      type: "string"
    - column: "newSubscriptionId"
      type: "string"
    - column: "subpartnerId"
      type: "string"
    - column: "token"
      type: "string"
    - column: "expiryDate"
      type: "date"
      format: "dd/MM/yyyy HH:mm:ss"
    - column: "nextBillDate"
      type: "date"
      format: "dd/MM/yyyy HH:mm:ss"
    - column: "chargingResult"
      type: "string"
    - column: "cents"
      type: "string"
    - column: "campaign"
      type: "string"
    - column: "productId"
      type: "string"
    - column: "serviceId"
      type: "string"
    - column: "la"
      type: "string"
    - column: "text"
      type: "string"
    - column: "args"
      type: "string"
    - column: "raw"
      type: "string"
    - column: "insurance.cellphone.currentPrice"
      type: "string"
    - column: "insurance.cellphone.state"
      type: "string"
    - column: "insurance.cellphone.imei"
      type: "string"
    - column: "insurance.cellphone.ownerDocumentNumber"
      type: "string"
    - column: "insurance.cellphone.ownerName"
      type: "string"
    - column: "insurance.cellphone.number"
      type: "string"
    - column: "insurance.quoteId"
      type: "string"
    - column: "insurance.partnerId"
      type: "string"
    - column: "insurance.planId"
      type: "string"
    - column: "insurance.customerDocumentNumber"
      type: "string"
    - column: "insurance.externalPartnerId"
      type: "string"
    - column: "insurance.offerId"
      type: "string"
    - column: "insurance.orderId"
      type: "string"
    - column: "insurance.certificateNumber"
      type: "string"
    - column: "eventDate"
      type: "date"
      format: "yyyy-MM-dd'T'HH:mm:ss"

# Nome da coluna CSV que contém o nome do endpoint a ser usado (opcional)
# Se configurada, cada linha pode especificar qual endpoint usar
# endpointColumnName: "Endpoint"

# Endpoint padrão a ser usado quando não especificado via --endpoint-name ou coluna CSV (opcional)
# Se não configurado e houver apenas 1 endpoint, ele será usado automaticamente
defaultEndpoint: "subscription_create"

# Lista de endpoints nomeados (obrigatório - deve ter pelo menos um)
# Cada endpoint tem sua própria URL, autenticação e mapeamento
endpoints:
  - name: "subscription_create"
    endpointUrl: "http://localhost:3100/hub/hub-connect-v2/v1/hub-connect-api-v2/events/ingest"
    # endpointUrl: "https://api-hub-homol.whitelabel.com.br/hub-connect-v2/v1/hub-connect-api-v2/events/ingest"
    # endpointUrl: "https://test-seho.requestcatcher.com/"
    # headers:
    #   Authorization: "Bearer seu-token-aqui"
    #   X-Custom-Header: "valor-customizado"
    method: "POST"
    requestTimeout: 30
    retryAttempts: 3
    retryDelaySeconds: 5
    maxRequestsPerSecond: 20
    mapping:
      - attribute: "event"
        fixedValue: "subscription_create"
      - attribute: "eventDate"
        csvColumn: "eventDate"
      - attribute: "partner"
        fixedValue: "partner"
      - attribute: "path"
        fixedValue: "/api/v1/events/ingest"
      - attribute: "payload.name"
        csvColumn: "name"
      - attribute: "payload.email"
        csvColumn: "email"
        transform: "lowercase"
      - attribute: "payload.cpf"
        csvColumn: "cpf"
      - attribute: "payload.cnpj"
        csvColumn: "cnpj"
      - attribute: "payload.msisdn"
        csvColumn: "msisdn"
      - attribute: "payload.newMsisdn"
        csvColumn: "newMsisdn"
      - attribute: "payload.subscriptionId"
        csvColumn: "subscriptionId"
      - attribute: "payload.newSubscriptionId"
        csvColumn: "newSubscriptionId"
      - attribute: "payload.subpartnerId"
        csvColumn: "subpartnerId"
      - attribute: "payload.token"
        csvColumn: "token"
      - attribute: "payload.expiryDate"
        csvColumn: "expiryDate"
      - attribute: "payload.nextBillDate"
        csvColumn: "nextBillDate"
      - attribute: "payload.chargingResult"
        csvColumn: "chargingResult"
      - attribute: "payload.cents"
        csvColumn: "cents"
      - attribute: "payload.campaign"
        csvColumn: "campaign"
      - attribute: "payload.productId"
        csvColumn: "productId"
      - attribute: "payload.serviceId"
        csvColumn: "serviceId"
      - attribute: "payload.la"
        csvColumn: "la"
      - attribute: "payload.text"
        csvColumn: "text"
      - attribute: "payload.args"
        csvColumn: "args"
      - attribute: "payload.raw"
        csvColumn: "raw"
      - attribute: "payload.insurance.cellphone.currentPrice"
        csvColumn: "insurance.cellphone.currentPrice"
      - attribute: "payload.insurance.cellphone.state"
        csvColumn: "insurance.cellphone.state"
      - attribute: "payload.insurance.cellphone.imei"
        csvColumn: "insurance.cellphone.imei"
      - attribute: "payload.insurance.cellphone.ownerDocumentNumber"
        csvColumn: "insurance.cellphone.ownerDocumentNumber"
      - attribute: "payload.insurance.cellphone.ownerName"
        csvColumn: "insurance.cellphone.ownerName"
      - attribute: "payload.insurance.cellphone.number"
        csvColumn: "insurance.cellphone.number"
      - attribute: "payload.insurance.quoteId"
        csvColumn: "insurance.quoteId"
      - attribute: "payload.insurance.partnerId"
        csvColumn: "insurance.partnerId"
      - attribute: "payload.insurance.planId"
        csvColumn: "insurance.planId"
      - attribute: "payload.insurance.customerDocumentNumber"
        csvColumn: "insurance.customerDocumentNumber"
      - attribute: "payload.insurance.externalPartnerId"
        csvColumn: "insurance.externalPartnerId"
      - attribute: "payload.insurance.offerId"
        csvColumn: "insurance.offerId"
      - attribute: "payload.insurance.orderId"
        csvColumn: "insurance.orderId"
      - attribute: "payload.insurance.certificateNumber"
        csvColumn: "insurance.certificateNumber"
